# =============================================================================
# LiteLLM Gateway configuration
# -----------------------------------------------------------------------------
# The app calls two logical model groups: "fast" and "reasoning".
# Each group has multiple deployments; the router picks one per request based on
# the routing strategy, and fails over to the others on error/timeout.
#
# Run:  litellm --config litellm.config.yaml  (or via docker-compose)
# Provider keys are read from the environment (never hardcode them here).
# =============================================================================

# -----------------------------------------------------------------------------
# Model-selection policy (IMPORTANT):
#   Each tier is defined TWICE — an Anthropic-preferring group and an OpenAI-only
#   group. The app (app/gateway/client.py) selects which group to call based on
#   whether ANTHROPIC_API_KEY is set:
#     * ANTHROPIC_API_KEY present -> "fast" / "reasoning"        (Claude preferred)
#     * no Anthropic key          -> "fast-openai" / "reasoning-openai" (GPT only)
#   This means: add an Anthropic key and the reasoning tier auto-upgrades to Claude
#   Sonnet (stronger at multi-step RCA) with ZERO code change; remove it and the
#   system keeps working on OpenAI alone with no wasted failed calls.
# -----------------------------------------------------------------------------
model_list:
  # --- "fast" tier: triage / classification (cheap + low latency) ---
  - model_name: fast
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY
  - model_name: fast
    litellm_params:
      model: anthropic/claude-3-5-haiku-latest
      api_key: os.environ/ANTHROPIC_API_KEY
  # OpenAI-only variant (used when no ANTHROPIC_API_KEY is configured)
  - model_name: fast-openai
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  # --- "reasoning" tier: root-cause analysis (stronger models) ---
  - model_name: reasoning
    litellm_params:
      model: anthropic/claude-3-5-sonnet-latest
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: reasoning
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY
  # OpenAI-only variant (used when no ANTHROPIC_API_KEY is configured)
  - model_name: reasoning-openai
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

router_settings:
  # Route to the lowest-latency healthy deployment within a group.
  # Alternatives: simple-shuffle, least-busy, usage-based-routing.
  routing_strategy: latency-based-routing
  num_retries: 2
  timeout: 60
  # Cross-group fallback: if every "reasoning" deployment fails, degrade to "fast".
  fallbacks:
    - reasoning: ["fast"]

litellm_settings:
  drop_params: true            # silently drop params a given provider doesn't support
  # max_budget: 50            # uncomment to cap total spend (USD) as a hard guardrail
  # budget_duration: 30d

general_settings:
  master_key: os.environ/LITELLM_API_KEY   # must match LITELLM_API_KEY in .env
