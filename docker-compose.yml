# =============================================================================
# Local platform services for the SRE Incident Copilot.
#   - qdrant : vector store for RAG over runbooks/postmortems
#   - litellm: model gateway the agents talk to (OpenAI-compatible)
# Start with:  docker compose up -d
# Provider keys come from .env (OPENAI_API_KEY, ANTHROPIC_API_KEY, LITELLM_API_KEY).
# =============================================================================

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: sre-qdrant
    ports:
      - "6333:6333"   # REST / HTTP
      - "6334:6334"   # gRPC
    volumes:
      - ./qdrant_storage:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: sre-litellm
    command: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "1"]
    ports:
      - "4000:4000"
    volumes:
      - ./litellm.config.yaml:/app/config.yaml:ro
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:4000/health/liveliness').status==200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 5
